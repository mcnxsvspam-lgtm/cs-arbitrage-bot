<!DOCTYPE html>
<html>

<head>

    <title>Steam Liquidity Scanner</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="header">

    <h1>Steam Liquidity Scanner</h1>

    <p>
        real steam order analysis
    </p>

</div>

<div class="grid">

{% for skin in skins %}

<div class="card">

    <img src="{{ skin.image }}"
         class="skin-image">

    <div class="content">

        <h2>{{ skin.name }}</h2>

        <div class="prices">

            <div class="price-row">
                <span class="label">
                    Lowest Sell
                </span>

                <span>
                    €{{ skin.lowest_sell }}
                </span>
            </div>

            <div class="price-row">
                <span class="label">
                    Highest Buy
                </span>

                <span>
                    €{{ skin.highest_buy }}
                </span>
            </div>

            <div class="price-row">
                <span class="label">
                    After Steam Fee
                </span>

                <span>
                    €{{ skin.steam_after_fee }}
                </span>
            </div>

        </div>

        <div class="profit">

            {{ skin.spread }}%

        </div>

        <div class="bottom">

            <div class="roi">
                Spread
            </div>

            <div class="volume">
                Liquidity {{ skin.liquidity }}/100
            </div>

        </div>

    </div>

</div>

{% endfor %}

</div>

</body>
</html>
